{% load static %}
<!-- Video Presentación Section -->
<section id="presentacion" class="py-24 bg-pg-black relative overflow-hidden">

    <!-- Ambient glow background -->
    <div class="absolute inset-0 pointer-events-none">
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(249,115,22,0.07) 0%,transparent 70%);"></div>
    </div>

    <div class="container mx-auto px-4 relative z-10">

        <!-- Section Header -->
        <div data-scroll-reveal class="text-center mb-14">
            <h2 class="text-5xl font-black mb-4 section-title-wave">
                <span class="text-white">Conocé</span> <span class="text-pg-orange">PatosGYM</span>
            </h2>
            <p class="text-gray-400 text-lg mt-6">Un vistazo a todo lo que te espera</p>
        </div>

        <!-- Video Card -->
        <div data-scroll-reveal class="max-w-5xl mx-auto">
            <!-- Outer glow ring -->
            <div class="p-px rounded-2xl" style="background: linear-gradient(135deg, rgba(249,115,22,0.6), rgba(249,115,22,0.1) 40%, rgba(249,115,22,0.4));">
                <div class="rounded-2xl overflow-hidden bg-pg-dark" style="box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 80px rgba(249,115,22,0.12);">

                    <!-- Top bar accent -->
                    <div class="flex items-center gap-2 px-5 py-3 border-b border-white/5" style="background:rgba(249,115,22,0.06);">
                        <div class="w-3 h-3 rounded-full bg-pg-orange/70"></div>
                        <div class="w-3 h-3 rounded-full bg-pg-orange/30"></div>
                        <div class="w-3 h-3 rounded-full bg-white/10"></div>
                        <span class="ml-3 text-xs font-semibold text-gray-500 tracking-widest uppercase">PatosGYM — Presentación Oficial</span>
                    </div>

                    <!-- Video -->
                    <video
                        class="w-full block"
                        controls
                        preload="metadata"
                        style="aspect-ratio:16/9;background:#000;"
                    >
                        <source src="/media/presentacion_patos.mp4" type="video/mp4">
                    </video>

                </div>
            </div>
        </div>

    </div>
</section>
