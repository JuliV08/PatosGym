# =====================================================
# Docker Compose Production - Villex
# =====================================================
# Uso: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  # =================================================
  # Base de datos PostgreSQL
  # =================================================
  db:
    image: postgres:15-alpine
    container_name: villex_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-villex_leads}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-villex_leads}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    
  patosgym_db:
    image: postgres:15-alpine
    container_name: patosgym_prod_db
    volumes:
      - /srv/patosgym/volumes/db_data:/var/lib/postgresql/data:rw
    environment:
      - POSTGRES_DB=patosgym
      - POSTGRES_USER=patos
      - POSTGRES_PASSWORD=patosgym_prod_pass_2024
    restart: unless-stopped

  patosgym_web:
    build:
      context: /srv/patosgym
      dockerfile: Dockerfile
    container_name: patosgym_prod_web
    volumes:
      - /srv/patosgym/volumes/static:/app/staticfiles:rw
      - /srv/patosgym/volumes/media:/app/media:rw
    environment:
      - DEBUG=0
      - SECRET_KEY=dummy_for_now_or_change_me
      - DATABASE_URL=postgres://patos:patosgym_prod_pass_2024@patosgym_db:5432/patosgym
    depends_on:
      - patosgym_db
    restart: unless-stopped

networks:
      - villex_network

  # =================================================
  # Backend Django + Gunicorn
  # =================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: villex_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
      - backend/.env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      # Overrides or variables not in files
      - CALENDLY_BASE_URL=${CALENDLY_BASE_URL:-https://calendly.com/villellijulian/30min}
    volumes:
      - static_files:/home/app/web/staticfiles
    
  patosgym_db:
    image: postgres:15-alpine
    container_name: patosgym_prod_db
    volumes:
      - /srv/patosgym/volumes/db_data:/var/lib/postgresql/data:rw
    environment:
      - POSTGRES_DB=patosgym
      - POSTGRES_USER=patos
      - POSTGRES_PASSWORD=patosgym_prod_pass_2024
    restart: unless-stopped

  patosgym_web:
    build:
      context: /srv/patosgym
      dockerfile: Dockerfile
    container_name: patosgym_prod_web
    volumes:
      - /srv/patosgym/volumes/static:/app/staticfiles:rw
      - /srv/patosgym/volumes/media:/app/media:rw
    environment:
      - DEBUG=0
      - SECRET_KEY=dummy_for_now_or_change_me
      - DATABASE_URL=postgres://patos:patosgym_prod_pass_2024@patosgym_db:5432/patosgym
    depends_on:
      - patosgym_db
    restart: unless-stopped

networks:
      - villex_network
    expose:
      - "8000"

  # =================================================
  # Nginx Reverse Proxy + Frontend
  # =================================================
  nginx:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_WHATSAPP_NUMBER=${VITE_WHATSAPP_NUMBER:-5491100000000}
    container_name: villex_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Configuraciones de nginx (villex + otros proyectos)
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/usr/share/nginx/static:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Frontend Application (SPA)
      # - villex_frontend_build:/usr/share/nginx/html:ro
      # COMMENTED OUT: Volume mount was overwriting Dockerfile's COPY --from=builder
      # Frontend files are now directly copied into image during build
      # DyM Cosmeticos volumes (external Docker volumes for real-time updates)
      - dym-cosmeticos_static_volume:/opt/dym-cosmeticos/staticfiles:ro
      - dym-cosmeticos_media_volume:/opt/dym-cosmeticos/media:ro
      - /srv/patosgym/volumes/static:/srv/patosgym/volumes/static:ro
      - /srv/patosgym/volumes/media:/srv/patosgym/volumes/media:ro
      - /srv/patosgym/volumes/static:/srv/patosgym/volumes/static:ro
      - /srv/patosgym/volumes/media:/srv/patosgym/volumes/media:ro
    
  patosgym_db:
    image: postgres:15-alpine
    container_name: patosgym_prod_db
    volumes:
      - /srv/patosgym/volumes/db_data:/var/lib/postgresql/data:rw
    environment:
      - POSTGRES_DB=patosgym
      - POSTGRES_USER=patos
      - POSTGRES_PASSWORD=patosgym_prod_pass_2024
    restart: unless-stopped

  patosgym_web:
    build:
      context: /srv/patosgym
      dockerfile: Dockerfile
    container_name: patosgym_prod_web
    volumes:
      - /srv/patosgym/volumes/static:/app/staticfiles:rw
      - /srv/patosgym/volumes/media:/app/media:rw
    environment:
      - DEBUG=0
      - SECRET_KEY=dummy_for_now_or_change_me
      - DATABASE_URL=postgres://patos:patosgym_prod_pass_2024@patosgym_db:5432/patosgym
    depends_on:
      - patosgym_db
    restart: unless-stopped

networks:
      - villex_network

# =================================================
# Volumes persistentes
# =================================================
volumes:
  postgres_data:
    name: villex_postgres_data
  static_files:
    name: villex_static_files
  dym-cosmeticos_static_volume:
    external: true
  dym-cosmeticos_media_volume:
    external: true
  # villex_frontend_build:
  #   external: true
  # COMMENTED OUT: No longer using external volume for frontend build
  # Frontend is now managed entirely by nginx container's built-in dist files

# =================================================
# Network
# =================================================

  patosgym_db:
    image: postgres:15-alpine
    container_name: patosgym_prod_db
    volumes:
      - /srv/patosgym/volumes/db_data:/var/lib/postgresql/data:rw
    environment:
      - POSTGRES_DB=patosgym
      - POSTGRES_USER=patos
      - POSTGRES_PASSWORD=patosgym_prod_pass_2024
    restart: unless-stopped

  patosgym_web:
    build:
      context: /srv/patosgym
      dockerfile: Dockerfile
    container_name: patosgym_prod_web
    volumes:
      - /srv/patosgym/volumes/static:/app/staticfiles:rw
      - /srv/patosgym/volumes/media:/app/media:rw
    environment:
      - DEBUG=0
      - SECRET_KEY=dummy_for_now_or_change_me
      - DATABASE_URL=postgres://patos:patosgym_prod_pass_2024@patosgym_db:5432/patosgym
    depends_on:
      - patosgym_db
    restart: unless-stopped

networks:
  villex_network:
    name: villex_network
    driver: bridge
