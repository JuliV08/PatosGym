# ============================================================
# PatosGym — Nginx Configuration (Standalone Container)
# ============================================================
#
# Two deployment options:
#
# A) As its own Nginx container (recommended for this project):
#    Add to docker-compose.production.yml:
#      nginx:
#        image: nginx:stable-alpine
#        container_name: patosgym_prod_nginx
#        restart: unless-stopped
#        ports:
#          - "80:80"
#          - "443:443"
#        volumes:
#          - ./nginx.conf:/etc/nginx/nginx.conf:ro
#          - /var/www/patosgym_prod/static:/opt/patosgym/static:ro
#          - /var/www/patosgym_prod/media:/opt/patosgym/media:ro
#          - /etc/letsencrypt:/etc/letsencrypt:ro
#          - /var/www/certbot:/var/www/certbot:ro
#        networks:
#          - patosgym_production_net
#        depends_on:
#          - web
#
# B) As a snippet dropped into villex_nginx (existing shared proxy):
#    Copy the server blocks below into your conf.d/patosgym.conf
#    and adjust the alias paths to match villex_nginx bind mounts.
#
# SSL: sudo certbot certonly --webroot \
#        -w /var/www/certbot \
#        -d patosgym.com.ar -d www.patosgym.com.ar
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept       on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Upload limit for gallery images
    client_max_body_size 25M;

    # ── Rate limiting (basic DDoS protection)
    limit_req_zone $binary_remote_addr zone=app:10m rate=30r/s;

    # ============================================================
    # HTTP → redirect to HTTPS
    # ============================================================
    server {
        listen 80;
        server_name patosgym.com.ar www.patosgym.com.ar;

        # ACME challenge (Let's Encrypt renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HTTPS — Main server block
    # ============================================================
    server {
        listen 443 ssl http2;
        server_name patosgym.com.ar www.patosgym.com.ar;

        # ── SSL Certificates (Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/patosgym.com.ar/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/patosgym.com.ar/privkey.pem;

        # ── Modern SSL hardening
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;
        resolver                  1.1.1.1 8.8.8.8 valid=300s;

        # ── Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── Static files — served directly from bind mount (no Django hit)
        location /static/ {
            alias   /opt/patosgym/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Vary          "Accept-Encoding";
            gzip_static on;
            access_log  off;
        }

        # ── Media files — served directly from bind mount
        location /media/ {
            alias   /opt/patosgym/media/;
            expires 7d;
            add_header Cache-Control "public, must-revalidate";
            access_log  off;
        }

        # ── Favicon (common browsers request this repeatedly)
        location = /favicon.ico {
            alias   /opt/patosgym/static/images/favicons/icono32.png;
            expires 30d;
            access_log off;
        }

        # ── Application proxy → Gunicorn (web container)
        location / {
            limit_req zone=app burst=60 nodelay;

            proxy_pass         http://web:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;

            # Buffer settings (avoid disk buffering for small responses)
            proxy_buffering       on;
            proxy_buffer_size     4k;
            proxy_buffers         8 8k;
        }
    }
}
